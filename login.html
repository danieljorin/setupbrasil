<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SetupBrasil Admin</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #131313;
    --bg-card: #161616;
    --border: #262626;
    --text: #f5f5f5;
    --text-soft: #a3a3a3;
    --text-muted: #525252;
    --accent: #ff5722;
    --accent-soft: rgba(255,87,34,0.1);
    --green: #22c55e;
    --red: #ef4444;
  }
  [data-theme="light"] {
    --bg: #fafaf7;
    --bg-elev: #ffffff;
    --bg-card: #ffffff;
    --border: #e7e5e0;
    --text: #0a0a0a;
    --text-soft: #525252;
    --text-muted: #a3a3a3;
    --accent: #ea580c;
    --accent-soft: rgba(234,88,12,0.08);
    --green: #16a34a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* Animated background */
  .bg-gradient {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: float 20s infinite ease-in-out;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: var(--accent);
    top: -200px; left: -100px;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: #6366f1;
    bottom: -150px; right: -100px;
    animation-delay: -10s;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: #ec4899;
    top: 50%; left: 50%;
    animation-delay: -5s;
    opacity: 0.2;
  }
  [data-theme="light"] .bg-orb { opacity: 0.15; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(80px, -50px) scale(1.1); }
    66% { transform: translate(-50px, 30px) scale(0.95); }
  }

  /* Grid pattern overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 1;
  }
  [data-theme="light"] body::before {
    background-image:
      linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
  }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px; height: 40px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    z-index: 10;
    transition: all 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  /* Back link */
  .back-link {
    position: fixed;
    top: 24px;
    left: 24px;
    color: var(--text-soft);
    text-decoration: none;
    font-size: 0.85rem;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: all 0.2s;
  }
  .back-link:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  /* Login card */
  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 2;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: slideUp 0.6s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Logo block */
  .login-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .login-mark {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    box-shadow: 0 6px 20px rgba(255,87,34,0.4);
    flex-shrink: 0;
  }
  .login-mark svg { width: 24px; height: 24px; }
  .login-brand {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .login-brand-name {
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .login-brand-sub {
    font-size: 0.7rem;
    color: var(--accent);
    margin-top: 4px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Heading */
  .login-card h1 {
    font-family: 'Geist', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .login-card h1 em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .login-card .subtitle {
    color: var(--text-soft);
    font-size: 0.95rem;
    margin-bottom: 32px;
  }

  /* Form */
  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-soft);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .field-input-wrap {
    position: relative;
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px 14px 44px;
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .field-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    pointer-events: none;
  }
  .field input:focus + .field-icon,
  .field-input-wrap:has(input:focus) .field-icon { color: var(--accent); }

  /* Show password */
  .show-pwd {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    font-size: 1rem;
  }
  .show-pwd:hover { color: var(--text); }

  /* Options row */
  .options-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    font-size: 0.85rem;
  }
  .checkbox-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-soft);
  }
  .checkbox-wrap input {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--accent);
  }
  .forgot {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .forgot:hover { opacity: 0.8; }

  /* Submit */
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(255,87,34,0.4);
  }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--text-muted);
    font-size: 0.78rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Demo credentials info */
  .demo-info {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 14px;
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.5;
  }
  .demo-info strong {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }
  .demo-info code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.85em;
  }

  /* Status message */
  .status-msg {
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
  }
  .status-msg.show { display: block; animation: slideDown 0.3s ease; }
  .status-msg.error {
    background: rgba(239,68,68,0.1);
    border: 1px solid var(--red);
    color: var(--red);
  }
  .status-msg.success {
    background: rgba(34,197,94,0.1);
    border: 1px solid var(--green);
    color: var(--green);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Loading spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  .submit-btn.loading .spinner { display: inline-block; }
  .submit-btn.loading span { display: none; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Footer */
  .login-footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-top: 28px;
    position: relative;
    z-index: 2;
  }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-gradient">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
</div>

<!-- Top buttons -->
<a href="index.html" class="back-link">← Voltar ao site</a>
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<!-- Login card -->
<div class="login-card">
  <div class="login-logo">
    <div class="login-mark"><svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="10" width="36" height="22" rx="3" fill="white"/><rect x="20" y="32" width="8" height="6" fill="white"/><rect x="14" y="38" width="20" height="3" rx="1.5" fill="white"/></svg></div>
    <div class="login-brand">
      <span class="login-brand-name">SetupBrasil</span>
      <span class="login-brand-sub">PAINEL ADMIN</span>
    </div>
  </div>

  <h1>Bem-vindo de <em>volta</em></h1>
  <p class="subtitle">Entre na sua conta para gerenciar o blog.</p>

  <div class="status-msg" id="statusMsg"></div>

  <form onsubmit="handleLogin(event)">
    <div class="field">
      <label for="email">E-mail</label>
      <div class="field-input-wrap">
        <input type="email" id="email" placeholder="seu@email.com" required value="admin@setupbrasil.com">
        <span class="field-icon">✉️</span>
      </div>
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <div class="field-input-wrap">
        <input type="password" id="password" placeholder="••••••••" required>
        <span class="field-icon">🔒</span>
        <button type="button" class="show-pwd" onclick="togglePwd()" id="pwdBtn">👁️</button>
      </div>
    </div>

    <div class="options-row">
      <label class="checkbox-wrap">
        <input type="checkbox" checked>
        <span>Lembrar-me</span>
      </label>
      <a href="#" class="forgot" onclick="alert('Em desenvolvimento'); return false;">Esqueci a senha</a>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <div class="spinner"></div>
      <span>Entrar no painel →</span>
    </button>
  </form>

  <div class="divider">Acesso de demonstração</div>

  <div class="demo-info">
    <strong>📝 Para testar:</strong><br>
    E-mail: <code>admin@setupbrasil.com</code><br>
    Senha: <code>admin123</code>
  </div>
</div>

<div class="login-footer">
  © 2026 SetupBrasil · Acesso restrito
</div>

<script>
  // Theme toggle
  function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const newTheme = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    document.getElementById('themeBtn').textContent = newTheme === 'dark' ? '🌙' : '☀️';
    try { localStorage.setItem('theme', newTheme); } catch(e) {}
  }

  try {
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
    }
  } catch(e) {}

  // Show password
  function togglePwd() {
    const input = document.getElementById('password');
    const btn = document.getElementById('pwdBtn');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁️';
    }
  }

  // Login handler
  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('statusMsg');

    btn.classList.add('loading');
    btn.disabled = true;
    status.classList.remove('show');

    setTimeout(() => {
      // Demo credentials
      if (email === 'admin@setupbrasil.com' && password === 'admin123') {
        status.className = 'status-msg success show';
        status.textContent = '✓ Login realizado! Redirecionando...';
        try { localStorage.setItem('auth', 'true'); } catch(e) {}
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 800);
      } else {
        btn.classList.remove('loading');
        btn.disabled = false;
        status.className = 'status-msg error show';
        status.textContent = '✗ E-mail ou senha incorretos. Use as credenciais de demo.';
      }
    }, 800);
  }
</script>

</body>
</html>
